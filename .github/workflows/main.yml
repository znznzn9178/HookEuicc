name: Build HookEuicc APK

on:
  workflow_dispatch:  # 保留手动触发功能

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 GitHub 免费 Linux 服务器
    steps:
      # 1. 拉取你仓库的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 17 环境（安卓编译必须）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'  # 稳定的 JDK 发行版
          cache: gradle            # 缓存 Gradle 依赖，加快下次打包速度

      # 3. 给 gradlew 脚本赋予可执行权限（Linux 必需）
      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      # 4. 打包 debug 版 APK（自动带调试签名，可直接安装）
      - name: Build debug APK (with auto signature)
        run: ./gradlew assembleDebug

      # 5. 上传生成的 debug 版 APK
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hookeuicc-debug-apk  # 下载时的压缩包名称
          path: "**/build/outputs/apk/debug/*.apk"
